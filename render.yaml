services:
  - type: web
    name: steelplant-maintenance-api
    runtime: python
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
    buildCommand: pip install -r backend/requirements.txt && python scripts/seed_data.py
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: XAI_API_KEY
        sync: false
      - key: LLM_FALLBACK_ORDER
        value: groq,gemini,anthropic,openai,xai,ollama
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: ENABLE_FULL_AGENTIC
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
